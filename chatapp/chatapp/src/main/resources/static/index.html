<!DOCTYPE html>
<html>
<head>
    <title>Multi Room Chat</title>
</head>
<body>

<h2>Multi-Room Chat</h2>

<input id="roomId" placeholder="Room ID">
<input id="sender" placeholder="Your Name">

<button onclick="joinRoom()">
    Join Room
</button>

<br><br>

<h3>Users in Room</h3>
<ul id="users"></ul>

<hr>

<input id="message" placeholder="Message">
<button onclick="sendMessage()">
    Send
</button>

<h3>Messages</h3>
<ul id="messages"></ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>

    let stompClient = null;
    let messageSubscription = null;
    let userSubscription = null;

    function sendMessage() {

        if (!stompClient || !stompClient.connected) {
            alert("Join a room first");
            return;
        }

        const sender =
            document.getElementById("sender").value;

        const content =
            document.getElementById("message").value;

        const roomId =
            document.getElementById("roomId").value;

        if (!content) {
            return;
        }

        stompClient.send(
            "/app/send",
            {},
            JSON.stringify({
                sender: sender,
                content: content,
                roomId: roomId
            })
        );

        document.getElementById("message").value = "";
    }

    function onMessageReceived(message) {

        const msg =
            JSON.parse(message.body);

        const li =
            document.createElement("li");

        li.textContent =
            msg.sender + ": " + msg.content;

        document
            .getElementById("messages")
            .appendChild(li);
    }

    function onUsersReceived(message) {

        const data =
            JSON.parse(message.body);

        const usersList =
            document.getElementById("users");

        usersList.innerHTML = "";

        data.users.forEach(user => {

            const li =
                document.createElement("li");

            li.textContent = "🟢 " + user;

            usersList.appendChild(li);
        });
    }

    function joinRoom() {

        const roomId =
            document.getElementById("roomId").value;

        const sender =
            document.getElementById("sender").value;

        if (!roomId) {
            alert("Enter Room ID");
            return;
        }

        if (!sender) {
            alert("Enter Your Name");
            return;
        }

        if (stompClient && stompClient.connected) {

            if (messageSubscription) {
                messageSubscription.unsubscribe();
            }

            if (userSubscription) {
                userSubscription.unsubscribe();
            }

            messageSubscription =
                stompClient.subscribe(
                    "/topic/" + roomId,
                    onMessageReceived
                );

            userSubscription =
                stompClient.subscribe(
                    "/topic/users/" + roomId,
                    onUsersReceived
                );

            stompClient.send(
                "/app/join",
                {},
                JSON.stringify({
                    sender: sender,
                    roomId: roomId
                })
            );

            return;
        }

        const socket =
            new SockJS("/chat");

        stompClient =
            Stomp.over(socket);

        stompClient.connect(
            {},
            function () {

                messageSubscription =
                    stompClient.subscribe(
                        "/topic/" + roomId,
                        onMessageReceived
                    );

                userSubscription =
                    stompClient.subscribe(
                        "/topic/users/" + roomId,
                        onUsersReceived
                    );

                stompClient.send(
                    "/app/join",
                    {},
                    JSON.stringify({
                        sender: sender,
                        roomId: roomId
                    })
                );

                alert(
                    "Joined Room: " +
                    roomId
                );
            }
        );
    }

</script>

</body>
</html>
